<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz - Page 1</title>
    
    <link rel="stylesheet" href="globals.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* This extra bit ensures the quiz stays centered in the browser window */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f8f8f8; /* Light grey background to make the white quiz pop */
        }
        
        .macbook-pro {
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); /* Adds a subtle shadow for a polished look */
            overflow: hidden;
        }

        /* Hover effect for the start button */
        .start:hover {
            opacity: 0.7;
            transform: scale(1.05);
            transition: all 0.2s ease;
        }
    </style>
</head>
<body>

    <div class="macbook-pro">
        <img class="vector" src="vector 2.svg" alt="Decoration" />
        <img class="img" src="vector 6.svg" alt="Decoration" />
        <img class="vector-2" src="vector 4.svg" alt="Decoration" />
        <img class="vector-3" src="vector 5.svg" alt="Decoration" />
        <img class="vector-4" src="vector 7.svg" alt="Decoration" />

        <img class="lets-see-how-youve" 
             src="Let’s see how you’ve been handling life since you moved out of your parent’s house.svg" 
             alt="Let's see how you've been handling life..." />

        <a href="quiz-page-2.html">
            <img class="start" src="start.svg" alt="Start Button" />
        </a>
    </div>

</body>
</html>
